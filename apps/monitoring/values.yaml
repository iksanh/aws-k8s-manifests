# =========================================================
# Grafana
# =========================================================
grafana:
  # Password  get from  existing secret not  plain text in Git!
  # Make secret manual once via: 
  #   kubectl create secret generic grafana-admin -n monitoring \
  #     --from-literal=admin-user=admin \
  #     --from-literal=admin-password='<strong-password>'
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  service:
    type: ClusterIP                    # exposure via Ingress, NodePort not needed

  persistence:
    enabled: true
    type: pvc
    storageClassName: gp3
    accessModes:
      - ReadWriteOnce
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# =========================================================
# Prometheus
# =========================================================
prometheus:
  service:
    type: ClusterIP

  prometheusSpec:
    retention: 15d
    retentionSize: "16GB"              # ~80% from storage size
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
    resources:
      requests:
        cpu: 200m
        memory: 400Mi
      limits:
        cpu: 1000m
        memory: 2Gi

# =========================================================
# Alertmanager
# =========================================================
alertmanager:
  service:
    type: ClusterIP

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# =========================================================
# Exporters
# =========================================================
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true