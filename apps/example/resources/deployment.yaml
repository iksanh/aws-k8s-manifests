apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
    spec:
      containers:
      - name: example-app
        image: quay.io/branz/prometheus-example-app:v0.5.0
        ports:
        - name: web
        - containerPort: 8080